version: '3.8'

services:
  postgres:
    image: ankane/pgvector:v0.5.1
    container_name: shootatsight_postgres
    environment:
      POSTGRES_DB: shootatsight_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: shootatsight_redis
    ports:
      - "6379:6379"

  api:
    build: .
    container_name: shootatsight_api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgrespassword@postgres:5432/shootatsight_db
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - postgres
      - redis

  celery_worker:
    build: .
    container_name: shootatsight_celery
    command: celery -A app.worker.celery_app worker --loglevel=info
    environment:
      - DATABASE_URL=postgresql://postgres:postgrespassword@postgres:5432/shootatsight_db
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - postgres
      - redis

volumes:
  pgdata:
